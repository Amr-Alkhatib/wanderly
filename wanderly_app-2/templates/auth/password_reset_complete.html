{% extends "base.html" %}
{% load static %}

{% block title %}Password Updated · Wanderly{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-brand">
      <span class="auth-brand-mark"></span>
      <span class="auth-brand-word">Wanderly</span>
    </div>

    <div class="auth-success">
      <div class="auth-success-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>

      <h1 class="auth-title">Password updated!</h1>
      <p class="auth-subtitle" style="margin-bottom:24px;">
        Your password has been reset successfully. You can now sign in with your new credentials.
      </p>

      <a href="{% url 'login' %}" class="auth-btn" style="display:flex;text-decoration:none;">
        <span class="btn-label">Sign in now →</span>
      </a>
    </div>

  </div>
</div>
{% endblock %}
